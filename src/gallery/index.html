<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Creatures — Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>

<body>
    <div id="gallery-app">
        <!-- Top bar -->
        <header id="gallery-header">
            <span id="gallery-counter">0 / 0</span>
            <span id="gallery-title">GALLERY</span>
            <div id="gallery-header-right">
                <div id="battery-indicator">
                    <svg id="battery-icon" viewBox="0 0 24 12" width="24" height="12">
                        <rect x="0.5" y="0.5" width="20" height="11" rx="1.5" ry="1.5"
                              fill="none" stroke="currentColor" stroke-width="1"/>
                        <rect x="21" y="3" width="2.5" height="5" rx="0.8" ry="0.8"
                              fill="currentColor"/>
                        <rect id="battery-fill" x="2" y="2" width="17" height="7" rx="0.5" ry="0.5"
                              fill="currentColor"/>
                    </svg>
                    <span id="battery-pct">--%</span>
                </div>
                <button id="btn-gallery-close" class="gallery-btn">CLOSE</button>
            </div>
        </header>

        <!-- Viewer -->
        <main id="gallery-viewer">
            <video id="gallery-video" class="hidden" muted playsinline></video>
            <img id="gallery-still" alt="Snapshot">

            <!-- Touch zones for prev / next -->
            <div id="zone-prev" class="touch-zone"></div>
            <div id="zone-next" class="touch-zone"></div>

            <!-- Empty state -->
            <div id="gallery-empty" class="hidden">
                <p>NO SNAPSHOTS</p>
            </div>
        </main>

        <!-- Bottom bar -->
        <footer id="gallery-footer">
            <button id="btn-gallery-delete" class="gallery-btn gallery-btn-danger">DELETE</button>
            <span id="gallery-timestamp"></span>
        </footer>

        <!-- Delete confirmation modal -->
        <div id="confirm-overlay" class="hidden">
            <div id="confirm-dialog">
                <p id="confirm-message"></p>
                <div id="confirm-actions">
                    <button id="confirm-cancel" class="gallery-btn">CANCEL</button>
                    <button id="confirm-ok" class="gallery-btn gallery-btn-danger">DELETE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/config.js"></script>
    <script src="gallery.js"></script>
</body>

</html>
